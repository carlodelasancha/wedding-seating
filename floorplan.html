<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laura & Carlo - Floor Plan</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --red: #c41e3a; --orange: #e88a20; --gold: #f5c842; --pink: #e8508a;
  --blue: #3a8abd; --cream: #faf3e8; --brown: #3a1c12; --tile: #f0e4d0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--cream); font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }

#canvas-wrap {
  width: 100vw; height: 100vh; overflow: hidden; position: relative; cursor: grab;
}
#canvas-wrap.dragging-table { cursor: grabbing; }
#canvas-wrap.dragging-person { cursor: grabbing; }

#world {
  position: absolute; width: 2400px; height: 1800px;
  background: #d4c9ab;
  transform-origin: 0 0;
  --table-mult: 1;
}
/* Escalado global de TODAS las mesas (slider en toolbar lo controla) */
#world .table-group {
  transform: scale(var(--table-mult));
  transform-origin: center center;
}

/* Venue architecture - SVG layer sits under everything */
#venue-svg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* Placed elements (dance floor, bar, tacos, photobooth, trees) */
.placed-element {
  position: absolute; border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  cursor: grab; box-shadow: 3px 3px 10px rgba(0,0,0,0.18); z-index: 6;
  user-select: none;
}
.placed-element:hover { filter: brightness(1.1); }
.placed-element:hover .pe-delete { opacity: 1; }
.placed-element.dragging { cursor: grabbing; opacity: 0.85; z-index: 100; }
.pe-delete {
  position: absolute; top: -10px; right: -10px; width: 22px; height: 22px;
  border-radius: 50%; background: #c41e3a; color: #fff; border: 2px solid #fff;
  font-size: 13px; font-weight: 700; line-height: 1; cursor: pointer; opacity: 0;
  transition: opacity 0.15s; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 20;
}
.pe-delete:hover { background: #e8203f; transform: scale(1.15); }
.placed-element:hover .pe-resize { opacity: 1; }
.pe-resize {
  position: absolute; bottom: -8px; right: -8px; width: 22px; height: 22px;
  background: #2a1a10; color: #f5c842; border: 2px solid #f5c842;
  border-radius: 50% 0 50% 50%;
  cursor: nwse-resize; opacity: 0;
  font-size: 12px; font-weight: 700; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 20;
  transition: opacity 0.15s, transform 0.1s;
  user-select: none;
}
.pe-resize:hover { transform: scale(1.15); background: #3a2818; }
.placed-element.resizing { cursor: nwse-resize; opacity: 0.85; z-index: 100; }
.placed-element.resizing .pe-resize { opacity: 1; transform: scale(1.2); }
.pe-emoji { font-size: 36px; margin-bottom: 4px; line-height: 1; }

/* Per-type styling */
.placed-element.pista {
  width: 340px; height: 340px;
  background: #f5e6c8; border: 3px solid #d4a030; border-radius: 12px;
  font: bold 22px Georgia, serif; color: #c4883a; opacity: 0.75;
  overflow: hidden;
}
.placed-element.pista .pe-emoji { font-size: 0; margin: 0; }
.placed-element.pista .pe-label { line-height: 1.3; }
.party-mode .placed-element.pista {
  opacity: 1;
  background: #2a1a10;
  border-color: #f5c842;
  animation: floor-pulse 2s ease-in-out infinite;
  color: #f5c842;
}
@keyframes floor-pulse {
  0%, 100% { box-shadow: inset 0 0 40px rgba(245,200,66,0.2); }
  50% { box-shadow: inset 0 0 60px rgba(232,80,138,0.3); }
}
.disco-light {
  position: absolute; border-radius: 50%; pointer-events: none;
  filter: blur(20px); opacity: 0;
}
.party-mode .placed-element.pista .disco-light { opacity: 0.5; }
.disco-light.l1 {
  width: 100px; height: 100px; background: #e8508a;
  top: 20px; left: 30px; animation: disco1 3s ease-in-out infinite;
}
.disco-light.l2 {
  width: 80px; height: 80px; background: #f5c842;
  top: 150px; right: 20px; animation: disco2 2.5s ease-in-out infinite;
}
.disco-light.l3 {
  width: 90px; height: 90px; background: #3a8abd;
  bottom: 30px; left: 100px; animation: disco3 3.5s ease-in-out infinite;
}
.disco-light.l4 {
  width: 70px; height: 70px; background: #4a8c3f;
  top: 60px; right: 100px; animation: disco4 2s ease-in-out infinite;
}
.disco-light.l5 {
  width: 60px; height: 60px; background: #c41e3a;
  bottom: 80px; left: 20px; animation: disco5 2.8s ease-in-out infinite;
}
@keyframes disco1 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(80px,60px); opacity: 0.7; } }
@keyframes disco2 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(-60px,40px); opacity: 0.6; } }
@keyframes disco3 { 0%,100% { transform: translate(0,0); opacity: 0.35; } 50% { transform: translate(40px,-50px); opacity: 0.65; } }
@keyframes disco4 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(-50px,70px); opacity: 0.6; } }
@keyframes disco5 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(70px,-30px); opacity: 0.7; } }

.placed-element.barra {
  width: 260px; height: 120px;
  background: linear-gradient(135deg, #2d1b4e, #5b2d8e); font-size: 18px;
  border: 3px solid #c9a0ff; border-radius: 14px;
  box-shadow: 0 0 20px rgba(91,45,142,0.3);
}
.placed-element.tacos {
  width: 240px; height: 110px;
  background: linear-gradient(135deg, #b85c00, #e8a020); font-size: 17px;
  border: 3px solid #ffe082; border-radius: 14px;
  box-shadow: 0 0 20px rgba(232,160,32,0.3);
}
.placed-element.photobooth {
  width: 230px; height: 110px;
  background: linear-gradient(135deg, #1a6b5a, #2ea88a); font-size: 17px;
  border: 3px solid #80ffd4; border-radius: 14px;
  box-shadow: 0 0 20px rgba(46,168,138,0.3);
}
.placed-element.arbol {
  width: 90px; height: 90px; background: transparent; box-shadow: none;
  border: none; border-radius: 0; color: transparent;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
  opacity: 0.55;
}
.placed-element.arbol:hover { opacity: 0.75; }
.placed-element.arbol .pe-emoji,
.placed-element.arbol .pe-label { display: none; }
/* Tronco: 12% ancho, 25% alto, anclado al centro-inferior (escala con el contenedor) */
.placed-element.arbol::before {
  content: ''; position: absolute; left: 50%; bottom: 0;
  width: 12%; height: 25%;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #6b4028 0%, #3a1c12 100%); border-radius: 2px;
}
/* Copa: 100% ancho, 88% alto, anclado al centro-superior (escala con el contenedor) */
.placed-element.arbol::after {
  content: ''; position: absolute; left: 50%; top: 0;
  width: 100%; height: 88%;
  transform: translateX(-50%);
  background: radial-gradient(circle at 40% 35%, #6fae4a 0%, #4a8c3f 50%, #2e6a27 100%);
  border-radius: 50%;
  box-shadow: inset -6px -8px 16px rgba(0,0,0,0.2);
}
.placed-element.banda {
  width: 220px; height: 120px;
  background: linear-gradient(135deg, #8b2323, #c41e3a); font-size: 16px;
  border: 3px solid #f5c842; border-radius: 14px;
  box-shadow: 0 0 20px rgba(196,30,58,0.35);
}
.placed-element.elotes {
  width: 240px; height: 110px;
  background: linear-gradient(135deg, #c8880a, #f5c842); font-size: 15px;
  border: 3px solid #ffe082; border-radius: 14px;
  box-shadow: 0 0 20px rgba(245,200,66,0.35);
  color: #3a1c12; text-shadow: 0 1px 2px rgba(255,255,255,0.3);
}

/* Element palette (top-right add menu) */
#element-palette {
  position: fixed; top: 12px; right: 12px; z-index: 55;
  display: flex; flex-direction: column; gap: 6px; align-items: stretch;
  width: 130px;
}
#element-palette .palette-title {
  font-size: 10px; color: var(--gold); text-transform: uppercase;
  letter-spacing: 1px; padding: 0 4px; margin-bottom: 2px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5); font-weight: 700;
}
#element-palette button {
  background: rgba(58,28,18,0.94); border: 2px solid var(--gold); color: var(--gold);
  padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 11px;
  font-weight: 600; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; justify-content: flex-start;
}
#element-palette button:hover { background: var(--gold); color: var(--brown); }
#element-palette .pal-emoji { font-size: 15px; }
/* Esconder palette cuando el sidebar de mesa está abierto */
body.sidebar-open #element-palette { display: none; }

/* Border decoration */
#world::before {
  content: ''; position: absolute; inset: 30px;
  border: 4px solid rgba(196,30,58,0.3); pointer-events: none;
  z-index: 1;
}

/* Tables */
.table-group {
  position: absolute; cursor: grab;
}
.table-group.dragging { cursor: grabbing; z-index: 100; opacity: 0.9; }
.table-group.drop-target .table-shape { transform: scale(1.08); filter: brightness(1.2); }

.table-shape {
  border: 2.5px solid rgba(255,255,255,0.4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-weight: bold; font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  box-shadow: 4px 4px 12px rgba(0,0,0,0.15);
  transition: transform 0.15s, filter 0.15s;
  z-index: 5;
}
.table-shape:hover { filter: brightness(1.05); }
.move-mode .table-group { cursor: crosshair; }
.move-mode .table-group .table-shape { animation: pulse-glow 1.5s infinite; }
@keyframes pulse-glow {
  0%, 100% { box-shadow: 4px 4px 12px rgba(0,0,0,0.15); }
  50% { box-shadow: 0 0 20px rgba(245,200,66,0.5); }
}
#move-banner {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%); z-index: 60;
  background: rgba(232,168,50,0.95); color: var(--brown); padding: 10px 20px;
  border-radius: 10px; font-size: 14px; font-weight: 600; display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2); text-align: center;
}
#move-banner button {
  background: var(--brown); color: var(--gold); border: none; padding: 4px 12px;
  border-radius: 4px; cursor: pointer; margin-left: 10px; font-size: 12px;
}
.table-shape.round {
  width: 104px; height: 104px; border-radius: 50%;
  background: var(--red);
}
.table-shape.rect {
  width: 130px; height: 64px; border-radius: 10px;
  background: var(--orange);
}
.table-shape.rect.rotated {
  width: 64px; height: 130px;
}
.table-shape.novios {
  width: 130px; height: 64px; border-radius: 10px;
  background: linear-gradient(135deg, #d4a030, #f5c842, #d4a030);
  border: 3px solid #fff; box-shadow: 0 0 15px rgba(245,200,66,0.4);
}
.table-count { font-size: 10px; font-weight: normal; opacity: 0.85; margin-top: 2px; }

/* Seats around tables */
.seat {
  position: absolute; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: transform 0.1s;
  z-index: 10;
}
.seat.occupied { cursor: grab; z-index: 15; }
.seat.occupied:hover { transform: scale(1.3); z-index: 20; }
.seat.occupied.being-moved { opacity: 0.3; transform: scale(0.7); }
.seat.empty {
  border: 2px dashed #c4b498; opacity: 0.4;
}
.person-move-active .seat.empty {
  opacity: 1; border: 2.5px solid var(--gold);
  background: rgba(245,200,66,0.25);
  width: 38px; height: 38px; margin: -4px;
}
.seat.nearest-target {
  outline: 3px solid var(--gold); transform: scale(1.5) !important;
  background: rgba(245,200,66,0.5) !important; border-radius: 50%;
  opacity: 1 !important; z-index: 25;
}
#person-drag-clone {
  position: fixed; z-index: 300; pointer-events: none; display: none;
  transform: scale(1.5);
}

.station-emoji { font-size: 36px; margin-bottom: 4px; }

/* Walking person */
.walking-person {
  position: absolute; z-index: 50; pointer-events: none;
  transition: left 2.5s ease-in-out, top 2.5s ease-in-out;
}
.walking-person .wp-head {
  width: 20px; height: 20px; border-radius: 50%; background: #f5d5a8;
  border: 2px solid rgba(58,32,16,0.25); margin: 0 auto;
}
.walking-person .wp-body {
  width: 22px; height: 22px; border-radius: 5px; margin: -2px auto 0;
}
.walking-person.male .wp-body { background: #3a8abd; }
.walking-person.female .wp-body { background: #e8508a; }
.walking-person.unknown .wp-body { background: #e88a20; }

/* Novios special styling */
.walking-person.bride .wp-body {
  background: #fff; border: 1px solid #e0d0b8;
  border-radius: 3px 3px 8px 8px; height: 28px; width: 24px; margin-left: -1px;
}
.walking-person.bride .wp-head { border: 2px solid #e0d0b8; }
.walking-person.bride .wp-legs .wp-leg { background: #fff; }
.walking-person.bride .wp-veil {
  position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
  width: 28px; height: 12px; background: rgba(255,255,255,0.7);
  border-radius: 50% 50% 0 0; border: 1px solid #e0d0b8;
}
.walking-person.groom .wp-body {
  background: #6b1f2a; border-radius: 3px;
}
.walking-person.groom .wp-head { border: 2px solid #5a1a22; }
.walking-person.groom .wp-legs .wp-leg { background: #3a1c12; }
.walking-person.groom .wp-tie {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 8px; background: #c41e3a;
}

/* Novios in seats too */
.seat .person.bride .body {
  background: #fff !important; border: 1px solid #e0d0b8;
  border-radius: 2px 2px 6px 6px; height: 16px !important;
}
.seat .person.groom .body {
  background: #6b1f2a !important;
}
.walking-person .wp-name {
  font-size: 8px; color: #3a1c12; text-align: center; white-space: nowrap;
  margin-top: 1px; background: rgba(250,243,232,0.9); padding: 1px 4px;
  border-radius: 3px; font-weight: 600;
}
.walking-person .wp-legs {
  display: flex; justify-content: center; gap: 4px; margin-top: -1px;
}
.walking-person .wp-leg {
  width: 6px; height: 10px; background: #5a3020; border-radius: 0 0 3px 3px;
}
.walking-person.walking .wp-leg:first-child { animation: legL 0.5s infinite; }
.walking-person.walking .wp-leg:last-child { animation: legR 0.5s infinite; }
@keyframes legL { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
@keyframes legR { 0%,100% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } }

/* Staff at stations */
.station-staff {
  position: absolute; z-index: 8; pointer-events: none; text-align: center;
}
.station-staff .staff-label {
  font-size: 7px; color: #fff; background: rgba(0,0,0,0.4);
  padding: 1px 4px; border-radius: 3px; margin-top: 2px;
}
.station-staff .wp-body { background: #3a1c12; }

/* Party mode */
.party-mode .seat.occupied { opacity: 0.15; }
.party-mode .seat-name { display: none; }

/* Speech bubble */
.speech-bubble {
  position: absolute; z-index: 100; pointer-events: none;
  background: #fff; color: #3a1c12; font-size: 9px; padding: 5px 8px;
  border-radius: 10px; max-width: 120px; text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-weight: 500;
  animation: bubble-pop 8s ease-out forwards;
  transform: translateX(-50%);
}
.speech-bubble::after {
  content: ''; position: absolute; bottom: -6px; left: 50%;
  transform: translateX(-50%);
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-top: 6px solid #fff;
}
@keyframes bubble-pop {
  0% { opacity: 0; transform: translateX(-50%) translateY(5px) scale(0.8); }
  10% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

/* Pending panel */
#pending-panel {
  position: fixed; left: 0; top: 0; width: 300px; height: 100vh;
  background: rgba(58,28,18,0.96); border-right: 3px solid var(--gold);
  color: var(--cream); padding: 16px; overflow-y: auto; z-index: 60;
  transform: translateX(-100%); transition: transform 0.3s;
}
#pending-panel.open { transform: translateX(0); }
.pending-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.pending-header h2 { color: var(--gold); font-size: 18px; }
.pending-header .close-btn {
  background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer;
}
#pending-count { font-size: 12px; color: #c4a070; margin-bottom: 12px; }
.pending-item {
  padding: 8px 10px; margin: 3px 0; border-radius: 6px; font-size: 13px;
  display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06);
}
.pending-item:hover { background: rgba(255,255,255,0.12); }
.assign-btn {
  background: rgba(74,140,63,0.4); border: 1px solid #4a8c3f; color: #8fdc6a;
  padding: 3px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
  margin-left: auto; white-space: nowrap;
}
.assign-btn:hover { background: #4a8c3f; color: #fff; }
.remove-btn {
  background: rgba(196,30,58,0.3); border: 1px solid #c41e3a; color: #f08080;
  padding: 2px 6px; border-radius: 4px; font-size: 9px; cursor: pointer;
  margin-left: auto; white-space: nowrap;
}
.remove-btn:hover { background: #c41e3a; color: #fff; }

#btn-pending { background: rgba(74,140,63,0.9) !important; }
#btn-meals { background: rgba(232,138,50,0.9) !important; }
#btn-captains { background: rgba(245,200,66,0.92) !important; color: #3a1c12 !important; }

/* Captains panel */
#captains-panel {
  position: fixed; left: 0; top: 0; width: 320px; height: 100vh;
  background: rgba(58,28,18,0.96); border-right: 3px solid var(--gold);
  color: var(--cream); padding: 16px; overflow-y: auto; z-index: 62;
  transform: translateX(-100%); transition: transform 0.3s;
}
#captains-panel.open { transform: translateX(0); }
.captains-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.captains-header h2 { color: var(--gold); font-size: 18px; }
#captains-count {
  font-size: 12px; color: #c4a070; margin-bottom: 12px;
  padding: 8px 10px; border-radius: 6px;
  background: rgba(245,200,66,0.1); text-align: center;
}
.captain-item {
  padding: 10px 12px; margin: 4px 0; border-radius: 8px; font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.3);
  cursor: pointer; transition: background 0.15s;
}
.captain-item:hover { background: rgba(245,200,66,0.22); }
.captain-star { color: var(--gold); font-size: 16px; }
.captain-info { flex: 1; min-width: 0; }
.captain-name { color: var(--cream); font-weight: 600; }
.captain-table { font-size: 11px; color: #c4a070; margin-top: 2px; }
.captain-empty {
  padding: 10px 12px; margin: 4px 0; border-radius: 8px; font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  background: rgba(196,30,58,0.12); border: 1px dashed rgba(196,30,58,0.5);
  color: #c4a070; font-style: italic; cursor: pointer;
}
.captain-empty:hover { background: rgba(196,30,58,0.2); }

/* Meals panel */
#meals-panel {
  position: fixed; left: 0; top: 0; width: 320px; height: 100vh;
  background: rgba(58,28,18,0.96); border-right: 3px solid var(--gold);
  color: var(--cream); padding: 16px; overflow-y: auto; z-index: 61;
  transform: translateX(-100%); transition: transform 0.3s;
}
#meals-panel.open { transform: translateX(0); }
.meals-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.meals-header h2 { color: var(--gold); font-size: 18px; }
.meals-total {
  padding: 10px 12px; margin-bottom: 14px; border-radius: 8px;
  background: rgba(245,200,66,0.15); border: 1px solid var(--gold);
  font-size: 13px; color: var(--gold); text-align: center; font-weight: 600;
}
.meal-category {
  margin-bottom: 10px; border-radius: 8px; overflow: hidden;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(196,160,112,0.25);
}
.meal-category.open { border-color: var(--gold); }
.meal-header {
  padding: 10px 12px; cursor: pointer; display: flex; align-items: center;
  gap: 10px; font-size: 14px; font-weight: 600; user-select: none;
  transition: background 0.15s;
}
.meal-header:hover { background: rgba(255,255,255,0.08); }
.meal-icon { font-size: 22px; }

.person { pointer-events: none; position: relative; }
.person .body {
  width: 14px; height: 14px; border-radius: 3px; margin: 0 auto;
}
.person .head {
  width: 10px; height: 10px; border-radius: 50%;

  margin: -2px auto 0; position: relative;

.person.male .body { background: var(--blue); }
.person.female .body { background: var(--pink); }
.person.unknown .body { background: var(--orange); }

  position: absolute; top: -3px; left: 0; right: 0; height: 5px;

dbRef.on('value', function(snap) {
  var data = snap.val();
  if (!data) return;
  tables = data.tables || [];
  guests = (data.guests || []).map(function(g) {
    g.gender = gender(g.name); return g;
  });
  groups = data.groups || [];

  // Load positions + seat map + captains + table name overrides from Firebase
  Promise.all([
    db.ref('floorplan/tablePositions').once('value'),
    db.ref('floorplan/seatMap').once('value'),
    db.ref('floorplan/captainByTable').once('value'),
    db.ref('floorplan/tableNames').once('value'),
    db.ref('floorplan/tableRotations').once('value'),
    db.ref('floorplan/pergolaOffset').once('value')
  ]).then(function(snaps) {
    captainByTable = snaps[2].val() || {};
    tableNameOverrides = snaps[3].val() || {};
    tableRotations = snaps[4].val() || {};
    var po = snaps[5].val();
    if (po && typeof po.dx === 'number' && typeof po.dy === 'number') {
      pergolaOffset = po;
      applyPergolaOffset();
    }
    if (Object.keys(captainByTable).length === 0) {
      seedLegacyCaptainsIfEmpty();
    }
    var fbPositions = snaps[0].val() || {};
    var fbCount = Object.keys(fbPositions).length;
    var expectedMin = Math.max(tables.length - 2, 8);

    if (fbCount < expectedMin) {
      var backups = loadLocalBackups();
      var bestBackup = null;
      for (var i = 0; i < backups.length; i++) {
        var bCount = Object.keys(backups[i].tablePositions || {}).length;
        if (bCount >= expectedMin) { bestBackup = backups[i]; break; }
      }
      if (bestBackup) {
        var msg = 'Firebase tiene solo ' + fbCount + ' posiciones de mesa (esperadas: ' + expectedMin + '+).\n' +
          'Backup local disponible: ' + new Date(bestBackup.timestamp).toLocaleString() +
          ' con ' + Object.keys(bestBackup.tablePositions).length + ' posiciones.\n\n' +
          'Restaurar el backup local?';
        if (confirm(msg)) {
          savedPositions = bestBackup.tablePositions;
          db.ref('floorplan/tablePositions').update(savedPositions);
        } else {
          savedPositions = fbPositions;
        }
      } else {
        savedPositions = fbPositions;
      }
    } else {
      savedPositions = fbPositions;
    }
    seatMap = snaps[1].val() || {};
    renderAll();
    updateStats();
    saveLocalBackup();
    // Si el panel de Pendientes está abierto, refrescarlo para reflejar cambios en la lista de guests
    if (pendingOpen) renderPendingList();
    // Si el panel de Comidas está abierto, refrescar también
    if (mealsOpen) renderMeals();
    // Si el panel de Capitanes está abierto, refrescar
    if (captainsOpen) renderCaptainsList();
    // Si el sidebar de mesa está abierto, refrescar sus invitados
    if (sidebarCurrentTableId) {
      var t = tables.find(function(x) { return x.id === sidebarCurrentTableId; });
      if (t) openSidebar(t, getTableGuestsOrdered(t.id));
    }
  });
  updateStats();
});

// LOCAL BACKUP (localStorage + manual export)
// ============================================================
function loadLocalBackups() {
  try { return JSON.parse(localStorage.getItem('floorplan_backups') || '[]'); }
  catch(e) { return []; }
}
function saveLocalBackup() {
  try {
    if (!savedPositions || Object.keys(savedPositions).length === 0) return;
    var backups = loadLocalBackups();
    var last = backups[0];
    if (last && JSON.stringify(last.tablePositions) === JSON.stringify(savedPositions)) return;
    backups.unshift({
      timestamp: Date.now(),
      tablePositions: JSON.parse(JSON.stringify(savedPositions)),
      seatMap: JSON.parse(JSON.stringify(seatMap || {}))
    });
    backups = backups.slice(0, 20);
    localStorage.setItem('floorplan_backups', JSON.stringify(backups));
  } catch(e) { console.error('Backup failed:', e); }
}
function exportPositionsFile() {
  var data = {
    exportedAt: new Date().toISOString(),
    tablePositions: savedPositions,
    seatMap: seatMap,
    tableCount: Object.keys(savedPositions || {}).length
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'floorplan-positions-' + new Date().toISOString().slice(0,19).replace(/[:.]/g,'-') + '.json';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

var world = document.getElementById('world');
var wrap = document.getElementById('canvas-wrap');

function renderAll() {
  // Clear existing tables
  world.querySelectorAll('.table-group').forEach(function(el) { el.remove(); });

  var cx = WORLD_W / 2, cy = WORLD_H / 2;
  var rounds = tables.filter(function(t) { return t.shape === 'round'; });
  var rects = tables.filter(function(t) { return t.shape === 'rect' && t.id !== 'novios'; });

  var defaults = {};
  defaults['novios'] = { x: cx, y: cy - 310 };
  rounds.forEach(function(t, i) {
    var a = Math.PI + (i / Math.max(rounds.length - 1, 1)) * Math.PI;
    defaults[t.id] = { x: cx + Math.cos(a) * 470, y: cy + Math.sin(a) * 360 - 20 };
  });
  rects.forEach(function(t, i) {
    var s = i % 2 === 0 ? -1 : 1, row = Math.floor(i / 2);
    defaults[t.id] = { x: cx + s * 570 + s * row * 20, y: 180 + row * 150 };
  });

  tables.forEach(function(t) {
    var pos = savedPositions[t.id] || defaults[t.id] || { x: 400, y: 400 };
    renderTable(t, pos.x, pos.y);
  });

  applyTransform();
}

function renderTable(table, x, y) {
  var tg = document.createElement('div');
  tg.className = 'table-group';
  tg.dataset.tableId = table.id;
  tg.style.left = x + 'px';
  tg.style.top = y + 'px';

  var cap = table.capacity || 10;
  var tGuestsAll = guests.filter(function(g) { return g.tableId === table.id; });
  var isRound = table.shape === 'round';
  var isNovios = table.id === 'novios';
  var isRectRotatable = table.shape === 'rect' && !isNovios;
  var isRotated = isRectRotatable && isTableRotated(table.id);

  // Ensure seat map is initialized for this table
  ensureSeatMap(table.id);

  // Table shape
  var shape = document.createElement('div');
  var shapeClass = 'table-shape ' + (isNovios ? 'novios' : isRound ? 'round' : 'rect');
  if (isRotated) shapeClass += ' rotated';
  shape.className = shapeClass;
  var lbl = document.createElement('div'); lbl.textContent = getTableDisplayName(table); shape.appendChild(lbl);
  var cnt = document.createElement('div'); cnt.className = 'table-count';
  cnt.textContent = tGuestsAll.length + '/' + cap; shape.appendChild(cnt);
  tg.appendChild(shape);

  // Center offset (rect base is 130×64; rotated is 64×130)
  var shapeW = isRound ? 104 : (isRotated ? 64 : 130);
  var shapeH = isRound ? 104 : (isRotated ? 130 : 64);
  shape.style.position = 'absolute';
  shape.style.left = (-shapeW/2) + 'px';
  shape.style.top = (-shapeH/2) + 'px';

  // Seats -- use seat map for fixed positions
  var seatCount = Math.max(cap, tGuestsAll.length);
  var radius = isRound ? 72 : 0;

  for (var i = 0; i < seatCount; i++) {
    var guest = guestAtSeat(table.id, i);
    var sx, sy;

    if (isNovios) {
      // Special: side by side in front of the table (Laura left, Carlo right)
      sx = (i === 0 ? 22 : -22);
      sy = -55;
    } else if (isRound) {
      var a = (i / seatCount) * Math.PI * 2 - Math.PI / 2;
      sx = Math.cos(a) * radius;
      sy = Math.sin(a) * radius;
    } else {
      // Rect tables: 4 seats on each long side + 1 centered on each short end (4+1+4+1=10).
      // Index order is clockwise from top-left so existing non-rotated seatMaps remap cleanly.
      var rW = isRotated ? 64 : 130;
      var rH = isRotated ? 130 : 64;
      var hw = rW/2 + 22, hh = rH/2 + 22;
      var longLen = 130;
      var slot = function(k) { return ((k + 0.5) / 4) * longLen - longLen / 2; }; // 4 seats spread along long side
      if (i < 10) {
        if (isRotated) {
          // Long sides vertical (left/right), short ends top/bottom
          if (i === 0)      { sx = 0;   sy = -hh; }            // top end
          else if (i <= 4)  { sx = hw;  sy = slot(i - 1); }    // right side, top→bottom
          else if (i === 5) { sx = 0;   sy = hh; }             // bottom end
          else              { sx = -hw; sy = slot(9 - i); }    // left side, bottom→top
        } else {
          // Long sides horizontal (top/bottom), short ends left/right
          if (i <= 3)       { sx = slot(i);     sy = -hh; }    // top, left→right
          else if (i === 4) { sx = hw;          sy = 0; }      // right end
          else if (i <= 8)  { sx = slot(8 - i); sy = hh; }     // bottom, right→left
          else              { sx = -hw;         sy = 0; }      // left end
        }
      } else {
        // Fallback for any extra seats beyond cap=10: old perimeter walk
        var peri = 2 * (rW + rH);
        var p = (i / seatCount) * peri;
        if (p < rW) { sx = -hw + 22 + p; sy = -hh; }
        else if (p < rW+rH) { sx = hw; sy = -hh + (p - rW); }
        else if (p < 2*rW+rH) { sx = hw - (p - rW - rH); sy = hh; }
        else { sx = -hw; sy = hh - (p - 2*rW - rH); }
      }
    }

    var seat = document.createElement('div');
    seat.className = 'seat ' + (guest ? 'occupied' : 'empty');
    seat.style.left = (sx - 15) + 'px';
    seat.style.top = (sy - 15) + 'px';

    seat.dataset.seatIdx = String(i);
    seat.dataset.tableId = table.id;

    if (guest) {
      seat.dataset.guestId = guest.id;

      var person = document.createElement('div');
      var g = guest.gender;
      var isBride = guest.id === 'novia_laura';
      var isGroom = guest.id === 'novio_carlo';
      var personClass = isBride ? 'bride' : isGroom ? 'groom' : (g === 'F' ? 'female' : g === 'M' ? 'male' : 'unknown');
      if (isCaptain(guest)) personClass += ' captain';
      person.className = 'person ' + personClass;
      var hair = document.createElement('div'); hair.className = 'hair';
      var head = document.createElement('div'); head.className = 'head';
      head.appendChild(hair);
      var body = document.createElement('div'); body.className = 'body';
      person.appendChild(head); person.appendChild(body);
      if (isCaptain(guest)) {
        var crown = document.createElement('div');
        crown.className = 'captain-crown';
        crown.textContent = '\u2605';
        person.appendChild(crown);
      }
      seat.appendChild(person);

      if (showNames) {
        var nm = document.createElement('div'); nm.className = 'seat-name';
        nm.textContent = guest.name.split(' ').slice(0, 2).join(' ');
        seat.appendChild(nm);
      }
    }

    tg.appendChild(seat);
  }

  // Table click for sidebar
  shape.addEventListener('click', function(e) {
    if (tg.dataset.wasDragged === 'true') { tg.dataset.wasDragged = 'false'; return; }
    openSidebar(table, getTableGuestsOrdered(table.id));
  });

  world.appendChild(tg);
}

// ============================================================
// PAN & ZOOM (on the wrap div)
// ============================================================
var isPanning = false, panStartX, panStartY, panOrigX, panOrigY;

wrap.addEventListener('pointerdown', function(e) {
  // Pergola is interactive (draggable) → never pan when clicking on it
  if (e.target.id === 'pergola-polygon' || e.target.closest && e.target.closest('#pergola-group')) {
    return;
  }
  // Only pan if click is directly on wrap, world, or on decorative venue SVG
  if (e.target === wrap || e.target === world || e.target.id === 'venue-svg'
      || (e.target.ownerSVGElement && e.target.ownerSVGElement.id === 'venue-svg')) {
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOrigX = panX; panOrigY = panY;
    wrap.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

window.addEventListener('pointermove', function(e) {
  if (isPanning) {
    panX = panOrigX + (e.clientX - panStartX);
    panY = panOrigY + (e.clientY - panStartY);
    applyTransform();
  }
});

window.addEventListener('pointerup', function() {
  if (isPanning) { isPanning = false; wrap.style.cursor = 'grab'; }
});

wrap.addEventListener('wheel', function(e) {
  e.preventDefault();
  var oldZoom = zoom;
  zoom = Math.max(0.15, Math.min(3, zoom - e.deltaY * 0.001));
  // Zoom toward pointer
  var rect = wrap.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (zoom / oldZoom);
  panY = my - (my - panY) * (zoom / oldZoom);
  applyTransform();
}, { passive: false });

function applyTransform() {
  world.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')';
}

function zoomFit() {
  var ww = window.innerWidth, wh = window.innerHeight;
  zoom = Math.min(ww / WORLD_W, wh / WORLD_H) * 0.9;
  panX = (ww - WORLD_W * zoom) / 2;
  panY = (wh - WORLD_H * zoom) / 2;
  applyTransform();
}

var dragTable = null, dragTableStartX, dragTableStartY, dragTableOrigLeft, dragTableOrigTop;

world.addEventListener('pointerdown', function(e) {
  // Person drag takes priority over table drag
  if (e.target.closest('.seat.occupied')) return;

  // Find closest .table-shape
  var shape = e.target.closest('.table-shape');
  if (!shape) return;
  var tg = shape.closest('.table-group');
  if (!tg) return;

  dragTable = tg;
  dragTable.classList.add('dragging');
  wrap.classList.add('dragging-table');
  dragTableStartX = e.clientX;
  dragTableStartY = e.clientY;
  dragTableOrigLeft = parseInt(tg.style.left);
  dragTableOrigTop = parseInt(tg.style.top);
  tg.dataset.wasDragged = 'false';
  e.preventDefault();
  e.stopPropagation();
});

window.addEventListener('pointermove', function(e) {
  if (dragTable) {
    var dx = (e.clientX - dragTableStartX) / zoom;
    var dy = (e.clientY - dragTableStartY) / zoom;
    dragTable.style.left = (dragTableOrigLeft + dx) + 'px';
    dragTable.style.top = (dragTableOrigTop + dy) + 'px';
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragTable.dataset.wasDragged = 'true';
  }
});

  if (dragTable) {
    dragTable.classList.remove('dragging');
    wrap.classList.remove('dragging-table');
    var tid = dragTable.dataset.tableId;
    var newPos = { x: parseInt(dragTable.style.left), y: parseInt(dragTable.style.top) };
    savedPositions[tid] = newPos;
    db.ref('floorplan/tablePositions/' + tid).set(newPos);
    saveLocalBackup();
    dragTable = null;
  }
});

document.getElementById('sidebar-guests').addEventListener('drop', function(e) {
  e.preventDefault();
  document.querySelectorAll('.guest-item.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
  if (!dragItem || !sidebarCurrentTableId) return;

  var dropTarget = e.target.closest('.guest-item');
  if (!dropTarget || dropTarget === dragItem) return;

  var dragId = dragItem.dataset.guestId;
  var dropId = dropTarget.dataset.guestId;

  // Get current order of guests at this table
  var tableGuests = guests.filter(function(g) { return g.tableId === sidebarCurrentTableId; });
  var dragIdx = tableGuests.findIndex(function(g) { return g.id === dragId; });
  var dropIdx = tableGuests.findIndex(function(g) { return g.id === dropId; });

  if (dragIdx < 0 || dropIdx < 0) return;

  // Reorder in the main guests array by swapping their positions in the array
  var dragGuest = tableGuests[dragIdx];
  var mainDragIdx = guests.indexOf(dragGuest);
  var mainDropIdx = guests.indexOf(tableGuests[dropIdx]);

  // Remove dragged guest and insert before/after drop target
  guests.splice(mainDragIdx, 1);
  var newDropIdx = guests.indexOf(tableGuests[dropIdx]);
  if (dragIdx < dropIdx) {
    guests.splice(newDropIdx + 1, 0, dragGuest);
  } else {
    guests.splice(newDropIdx, 0, dragGuest);
  }

  // Save full guest order to Firebase
  dbRef.child('guests').set(guests);

  // Re-render
  renderAll();
  var table = tables.find(function(t) { return t.id === sidebarCurrentTableId; });
  var newGuests = guests.filter(function(g) { return g.tableId === sidebarCurrentTableId; });
  openSidebar(table, newGuests);
});

function getGuestById(id) {
  return guests.find(function(g) { return g.id === id; }) || null;
}

function startRenameTable(table) {
  var titleEl = document.getElementById('sidebar-title');
  while (titleEl.firstChild) titleEl.removeChild(titleEl.firstChild);
  titleEl.style.cssText = 'display:flex;align-items:center;gap:6px;';

  var input = document.createElement('input');
  input.type = 'text';
  input.value = getTableDisplayName(table);
  input.placeholder = table.name;
  input.style.cssText = 'flex:1;padding:6px 10px;background:rgba(255,255,255,0.1);border:2px solid var(--gold);color:var(--gold);font-size:18px;font-weight:700;border-radius:6px;outline:none;font-family:inherit;';
  titleEl.appendChild(input);

  var saveBtn = document.createElement('button');
  saveBtn.textContent = '\u2713';
  saveBtn.title = 'Guardar';
  saveBtn.style.cssText = 'background:#4a8c3f;border:none;color:#fff;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;padding:0;flex-shrink:0;';
  titleEl.appendChild(saveBtn);

  var cancelBtn = document.createElement('button');
  cancelBtn.textContent = '\u2715';
  cancelBtn.title = 'Cancelar';
  cancelBtn.style.cssText = 'background:rgba(196,30,58,0.6);border:none;color:#fff;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;padding:0;flex-shrink:0;';
  titleEl.appendChild(cancelBtn);

  input.focus();
  input.select();

  function commit() {
    var newName = input.value.trim();
    if (newName && newName !== table.name) {
      setTableName(table.id, newName);
    } else if (!newName) {
      // Empty → restore default
      setTableName(table.id, '');
    }
    openSidebar(table, getTableGuestsOrdered(table.id));
  }
  function cancel() {
    openSidebar(table, getTableGuestsOrdered(table.id));
  }
  saveBtn.addEventListener('click', commit);
  cancelBtn.addEventListener('click', cancel);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
}

// MEALS PANEL

var MEAL_CATEGORIES = [
  { key: 'filet', label: 'Filet Mignon', icon: '\ud83e\udd69',
    match: function(m) { return m.indexOf('mignon') >= 0 || m.indexOf('filet') >= 0 || m.indexOf('steak') >= 0; } },
  { key: 'fish', label: 'Pescado', icon: '\ud83d\udc1f',
    match: function(m) { return m.indexOf('fish') >= 0 || m.indexOf('pescado') >= 0 || m.indexOf('salmon') >= 0; } },
  { key: 'veg', label: 'Vegetariano', icon: '\ud83e\udd66',
    match: function(m) { return m.indexOf('vegetar') >= 0 || m.indexOf('vegan') >= 0; } },
  { key: 'unknown', label: 'Sin elegir', icon: '\u2753',
    match: function(m) { return !m; } }
];
function classifyMeal(guest) {
  var m = (guest.meal || '').toLowerCase().trim();
  for (var i = 0; i < MEAL_CATEGORIES.length; i++) {
    if (MEAL_CATEGORIES[i].match(m)) return MEAL_CATEGORIES[i].key;
  }
  return 'unknown';
}
var mealsOpen = false;
var mealCategoryOpen = {};

function renderMeals() {
  var buckets = {};
  MEAL_CATEGORIES.forEach(function(c) { buckets[c.key] = []; });
  guests.forEach(function(g) {
    if (g.id === 'novio_carlo' || g.id === 'novia_laura') return;
    buckets[classifyMeal(g)].push(g);
  });
  var total = 0;
  MEAL_CATEGORIES.forEach(function(c) { total += buckets[c.key].length; });
  document.getElementById('meals-total').textContent = 'Total: ' + total + ' invitados';

  var list = document.getElementById('meals-list');
  while (list.firstChild) list.removeChild(list.firstChild);

  MEAL_CATEGORIES.forEach(function(cat) {
    var arr = buckets[cat.key];
    if (arr.length === 0 && cat.key === 'unknown') return;
    var wrap = document.createElement('div');
    wrap.className = 'meal-category' + (mealCategoryOpen[cat.key] ? ' open' : '');

    var header = document.createElement('div');
    header.className = 'meal-header';
    var icon = document.createElement('span'); icon.className = 'meal-icon'; icon.textContent = cat.icon;
    var label = document.createElement('span'); label.className = 'meal-label'; label.textContent = cat.label;
    var count = document.createElement('span'); count.className = 'meal-count'; count.textContent = arr.length;
    var caret = document.createElement('span'); caret.className = 'meal-caret'; caret.textContent = '\u25b6';
    header.appendChild(icon); header.appendChild(label); header.appendChild(count); header.appendChild(caret);
    header.addEventListener('click', (function(key) {
      return function() {
        mealCategoryOpen[key] = !mealCategoryOpen[key];
        renderMeals();
      };
    })(cat.key));
    wrap.appendChild(header);

    var sublist = document.createElement('div'); sublist.className = 'meal-list';
    if (arr.length === 0) {
      var em = document.createElement('div'); em.className = 'meal-empty';
      em.textContent = 'Nadie en esta categoría';
      sublist.appendChild(em);
    } else {
      arr.sort(function(a,b) { return a.name.localeCompare(b.name); });
      arr.forEach(function(g) {
        var item = document.createElement('div');
        item.className = 'meal-guest' + (g.tableId ? '' : ' no-table');
        var nm = document.createElement('span'); nm.textContent = g.name;
        var tb = document.createElement('span'); tb.className = 'mg-table';
        if (g.tableId) {
          var t = tables.find(function(x) { return x.id === g.tableId; });
          tb.textContent = t ? getTableDisplayName(t) : g.tableId;
        } else {
          tb.textContent = 'sin mesa';
        }
        item.appendChild(nm); item.appendChild(tb);
        sublist.appendChild(item);
      });
    }
    wrap.appendChild(sublist);
    list.appendChild(wrap);
  });
}

var captainsOpen = false;

function renderCaptainsList() {
  var list = document.getElementById('captains-list');
  var countEl = document.getElementById('captains-count');
  while (list.firstChild) list.removeChild(list.firstChild);

  // Sort tables alphabetically by display name (skip novios)
  var sorted = tables.slice()
    .filter(function(t) { return t.id !== 'novios'; })
    .sort(function(a, b) {
      return getTableDisplayName(a).localeCompare(getTableDisplayName(b), 'es', { numeric: true });
    });

  var assigned = 0;
  sorted.forEach(function(tbl) {
    var capId = captainByTable[tbl.id];
    var cap = capId ? guests.find(function(g) { return g.id === capId; }) : null;
    if (cap) assigned++;

    var item = document.createElement('div');
    item.className = cap ? 'captain-item' : 'captain-empty';

    var icon = document.createElement('span');
    icon.className = cap ? 'captain-star' : '';
    icon.textContent = cap ? '★' : '⚠️';
    item.appendChild(icon);

    var info = document.createElement('div');
    info.className = 'captain-info';
    var nm = document.createElement('div');
    nm.className = 'captain-name';
    nm.textContent = cap ? cap.name : 'Sin capitán';
    info.appendChild(nm);
    var tb = document.createElement('div');
    tb.className = 'captain-table';
    tb.textContent = getTableDisplayName(tbl);
    info.appendChild(tb);
    item.appendChild(info);

    item.addEventListener('click', (function(table) {
      return function() {
        openSidebar(table, getTableGuestsOrdered(table.id));
        var tgEl = world.querySelector('[data-table-id="' + table.id + '"]');
        if (tgEl) {
          var tx = parseInt(tgEl.style.left), ty = parseInt(tgEl.style.top);
          zoom = 1.2;
          panX = -tx * zoom + window.innerWidth / 2;
          panY = -ty * zoom + window.innerHeight / 2;
          applyTransform();
        }
      };
    })(tbl));

    list.appendChild(item);
  });

  countEl.textContent = assigned + ' de ' + sorted.length + ' mesas con capitán';
}

// ============================================================
// TABLE SWAP (swap all guests between two tables)
// ============================================================
var swapSourceTable = null;

function startTableSwap(sourceTable) {
  swapSourceTable = sourceTable;
  document.getElementById('sidebar').classList.remove('open');

  // Show swap banner
  var banner = document.getElementById('move-banner');
  while (banner.firstChild) banner.removeChild(banner.firstChild);
  banner.appendChild(document.createTextNode('Intercambiar ' + sourceTable.name + ' con... click en la otra mesa '));
  var cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.addEventListener('click', cancelTableSwap);
  banner.appendChild(cancelBtn);
  banner.style.display = 'block';
  world.classList.add('move-mode');
}

function cancelTableSwap() {
  swapSourceTable = null;
  document.getElementById('move-banner').style.display = 'none';
  world.classList.remove('move-mode');
}

// Override table click when swap is active
world.addEventListener('click', function(e) {
  if (!swapSourceTable) return;
  var shape = e.target.closest('.table-shape');
  if (!shape) return;
  var tg = shape.closest('.table-group');
  if (!tg) return;

  var targetId = tg.dataset.tableId;
  if (targetId === swapSourceTable.id) return; // can't swap with self

  var targetTable = tables.find(function(t) { return t.id === targetId; });
  if (!targetTable) return;

  // Swap all guests between the two tables
  var sourceGuests = guests.filter(function(g) { return g.tableId === swapSourceTable.id; });
  var targetGuests = guests.filter(function(g) { return g.tableId === targetId; });

  sourceGuests.forEach(function(g) { g.tableId = targetId; });
  targetGuests.forEach(function(g) { g.tableId = swapSourceTable.id; });

  // Save to Firebase
  dbRef.child('guests').set(guests);

  cancelTableSwap();
  renderAll();
  updateStats();

  // Open sidebar on original source table (now with new guests)
  openSidebar(swapSourceTable, guests.filter(function(g) { return g.tableId === swapSourceTable.id; }));
});

// ============================================================
// MAP SEAT MOVE (pointer events - much more reliable than drag API)
// ============================================================
var movingSeat = null;      // the .seat element being moved
var movingTableId = null;   // which table it belongs to
var moveStarted = false;    // did the pointer actually move (vs just click)
var moveStartX = 0, moveStartY = 0;
var dragClone = document.getElementById('person-drag-clone');
var dragGhostEl = document.getElementById('drag-ghost');

world.addEventListener('pointerdown', function(e) {
  var seat = e.target.closest('.seat.occupied');
  if (!seat || dragTable) return; // don't interfere with table drag

  movingSeat = seat;
  movingTableId = seat.dataset.tableId;
  moveStarted = false;
  moveStartX = e.clientX;
  moveStartY = e.clientY;

  e.preventDefault();
  e.stopPropagation();
});

window.addEventListener('pointermove', function(e) {
  if (!movingSeat) return;

  var dx = e.clientX - moveStartX;
  var dy = e.clientY - moveStartY;

  // Only start move after 5px threshold (avoid accidental drags)
  if (!moveStarted && Math.abs(dx) + Math.abs(dy) < 5) return;

  if (!moveStarted) {
    moveStarted = true;
    movingSeat.classList.add('being-moved');
    world.classList.add('person-move-active');

    // Show clone following cursor
    var personEl = movingSeat.querySelector('.person');
    if (personEl) {
      dragClone.textContent = '';
      dragClone.appendChild(personEl.cloneNode(true));
      dragClone.style.display = 'block';
    }

    // Show name ghost
    var guest = getGuestById(movingSeat.dataset.guestId);
    if (guest) {
      dragGhostEl.textContent = guest.name;
      dragGhostEl.style.display = 'block';
    }
  }

  // Move clone with cursor
  dragClone.style.left = (e.clientX - 12) + 'px';
  dragClone.style.top = (e.clientY - 18) + 'px';
  dragGhostEl.style.left = (e.clientX + 20) + 'px';
  dragGhostEl.style.top = (e.clientY - 8) + 'px';

  // Highlight nearest seat
  world.querySelectorAll('.seat.nearest-target').forEach(function(el) { el.classList.remove('nearest-target'); });
  var nearest = findNearestSeat(e.clientX, e.clientY);
  if (nearest) nearest.classList.add('nearest-target');
});

window.addEventListener('pointerup', function(e) {
  if (!movingSeat) return;

  // Clean up visuals
  movingSeat.classList.remove('being-moved');
  world.classList.remove('person-move-active');
  dragClone.style.display = 'none';
  dragGhostEl.style.display = 'none';
  world.querySelectorAll('.seat.nearest-target').forEach(function(el) { el.classList.remove('nearest-target'); });

  if (moveStarted) {
    var target = findNearestSeat(e.clientX, e.clientY);
    if (target && target !== movingSeat) {
      handleSeatDrop(movingSeat, target);
    } else {
      // Dropped outside any seat -- send to pending
      var guest = getGuestById(movingSeat.dataset.guestId);
      if (guest && confirm('Mover a ' + guest.name + ' a Pendientes?')) {
        sendToPending(guest);
      }
    }
  } else {
    // Was just a click, not a drag -- open sidebar
    var tableId = movingSeat.dataset.tableId;
    var table = tables.find(function(t) { return t.id === tableId; });
    if (table) {
      openSidebar(table, getTableGuestsOrdered(tableId));
    }
  }

  movingSeat = null;
  movingTableId = null;
  moveStarted = false;
});

function findNearestSeat(clientX, clientY) {
  if (!movingSeat) return null;
  var best = null, bestDist = 80; // 80px radius -- search across ALL tables
  world.querySelectorAll('.table-group .seat').forEach(function(s) {
    if (s === movingSeat) return;
    var rect = s.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dist = Math.sqrt((clientX - cx) * (clientX - cx) + (clientY - cy) * (clientY - cy));
    if (dist < bestDist) { bestDist = dist; best = s; }
  });
  return best;
}

// ============================================================
// SEAT POSITION MAP -- fixed positions per table
// Each table has N seats (0..N-1). Each guest is assigned to a specific seat index.
// Stored in localStorage as: { tableId: { seatIdx: guestId, ... } }
// ============================================================
var seatMap = {}; // tableId -> { 0: guestId, 1: guestId, ... }

function loadSeatMap() {
  // Loaded from Firebase in dbRef.on('value') callback
}

function saveSeatMap() {
  if (!seatMap || Object.keys(seatMap).length === 0) {
    console.warn('saveSeatMap aborted: empty seatMap would overwrite Firebase');
    return;
  }
  db.ref('floorplan/seatMap').set(seatMap);
}

// Initialize seat map for a table (first time or if guests changed)
function ensureSeatMap(tableId) {
  var tableGuests = guests.filter(function(g) { return g.tableId === tableId; });
  var table = tables.find(function(t) { return t.id === tableId; });
  var cap = table ? (table.capacity || 10) : 10;

  if (!seatMap[tableId]) seatMap[tableId] = {};

  // Check if all current guests are already mapped
  var mapped = seatMap[tableId];
  var assignedIds = new Set(Object.values(mapped));
  var needsRebuild = false;

  // Check if any guest in this table is NOT in the map
  tableGuests.forEach(function(g) {
    if (!assignedIds.has(g.id)) needsRebuild = true;
  });

  // Check if any mapped guest is no longer at this table
  Object.keys(mapped).forEach(function(idx) {
    var gId = mapped[idx];
    var g = guests.find(function(x) { return x.id === gId; });
    if (!g || g.tableId !== tableId) needsRebuild = true;
  });

  if (needsRebuild) {
    // Rebuild: keep existing assignments that are still valid, fill gaps
    var newMap = {};
    var usedSeats = new Set();
    var unmapped = [];

    // Keep valid existing assignments
    Object.keys(mapped).forEach(function(idx) {
      var gId = mapped[idx];
      var g = guests.find(function(x) { return x.id === gId; });
      if (g && g.tableId === tableId && parseInt(idx) < cap) {
        newMap[idx] = gId;
        usedSeats.add(parseInt(idx));
      }
    });

    // Find unmapped guests
    tableGuests.forEach(function(g) {
      var found = false;
      Object.values(newMap).forEach(function(id) { if (id === g.id) found = true; });
      if (!found) unmapped.push(g);
    });

    // Assign unmapped to first available seats
    var seatIdx = 0;
    unmapped.forEach(function(g) {
      while (usedSeats.has(seatIdx) && seatIdx < cap) seatIdx++;
      if (seatIdx < cap) {
        newMap[String(seatIdx)] = g.id;
        usedSeats.add(seatIdx);
        seatIdx++;
      }
    });

    seatMap[tableId] = newMap;
    saveSeatMap();
  }

  return seatMap[tableId];
}

// Get guest at a specific seat, or null
function guestAtSeat(tableId, seatIdx) {
  var map = seatMap[tableId] || {};
  var gId = map[String(seatIdx)];
  if (!gId) return null;
  return guests.find(function(g) { return g.id === gId; }) || null;
}

function handleSeatDrop(fromSeat, toSeat) {
  var fromTableId = fromSeat.dataset.tableId;
  var toTableId = toSeat.dataset.tableId;
  var fromIdx = String(fromSeat.dataset.seatIdx);
  var toIdx = String(toSeat.dataset.seatIdx);

  if (!seatMap[fromTableId]) seatMap[fromTableId] = {};
  if (!seatMap[toTableId]) seatMap[toTableId] = {};

  var fromMap = seatMap[fromTableId];
  var toMap = seatMap[toTableId];
  var movingGuestId = fromMap[fromIdx];
  var displacedGuestId = toMap[toIdx]; // undefined if empty

  if (fromTableId === toTableId) {
    // Same-table move: only seatMap changes, no tableId update
    if (toSeat.classList.contains('empty')) {
      fromMap[toIdx] = movingGuestId;
      delete fromMap[fromIdx];
    } else {
      fromMap[fromIdx] = displacedGuestId;
      fromMap[toIdx] = movingGuestId;
    }
    saveSeatMap();
  } else {
    // Cross-table move: update guest.tableId on BOTH sides + both seatMaps
    var movingGuest = guests.find(function(g) { return g.id === movingGuestId; });
    var displacedGuest = displacedGuestId
      ? guests.find(function(g) { return g.id === displacedGuestId; })
      : null;

    // Capacity check when destination is empty (avoid overpacking the target table)
    if (!displacedGuestId) {
      var toTable = tables.find(function(t) { return t.id === toTableId; });
      var toCap = toTable ? (toTable.capacity || 10) : 10;
      var currentAtTo = guests.filter(function(g) { return g.tableId === toTableId; }).length;
      if (currentAtTo >= toCap) {
        // Already full -- bail out with visual feedback (red flash on target seat)
        toSeat.style.outline = '3px solid #c41e3a';
        setTimeout(function() { toSeat.style.outline = ''; }, 500);
        return;
      }
    }

    if (movingGuest) movingGuest.tableId = toTableId;
    if (displacedGuest) displacedGuest.tableId = fromTableId;

    if (displacedGuestId) {
      fromMap[fromIdx] = displacedGuestId;
      toMap[toIdx] = movingGuestId;
    } else {
      delete fromMap[fromIdx];
      toMap[toIdx] = movingGuestId;
    }

    // Persist BOTH guests array and seatMap atomically (avoid stale tableId)
    dbRef.child('guests').set(guests);
    saveSeatMap();
  }

  renderAll();
  updateStats();

  // Refresh sidebar if open on either affected table
  if (sidebarCurrentTableId === fromTableId || sidebarCurrentTableId === toTableId) {
    var sbTable = tables.find(function(t) { return t.id === sidebarCurrentTableId; });
    if (sbTable) openSidebar(sbTable, getTableGuestsOrdered(sbTable.id));
  }
}

// Get guests for a table in seat order
function getTableGuestsOrdered(tableId) {
  var table = tables.find(function(t) { return t.id === tableId; });
  var cap = table ? (table.capacity || 10) : 10;
  var map = ensureSeatMap(tableId);
  var ordered = [];
  for (var i = 0; i < cap; i++) {
    var g = guestAtSeat(tableId, i);
    if (g) ordered.push(g);
  }
  return ordered;
}

// ADD NEW GUEST (form en el panel de pendientes)
// ============================================================
function openAddGuestForm() {
  var name = prompt('Nombre completo del nuevo invitado:');
  if (!name || !name.trim()) return;
  name = name.trim();

  // Check duplicate
  var existing = guests.find(function(g) { return g.name.toLowerCase() === name.toLowerCase(); });
  if (existing) {
    alert('Ya existe un invitado con ese nombre: "' + existing.name + '". No se agregó.');
    return;
  }

  var side = prompt('¿De qué lado? Escribe "laura" o "carlo" (dejar vacío si no sabes):', 'laura');
  side = (side || '').trim().toLowerCase();
  if (side !== 'laura' && side !== 'carlo') side = '';

  var meal = prompt('Meal choice (opcional): filet mignon / seasonal fish / vegetarian / kids:');
  meal = (meal || '').trim();

  var diet = prompt('Alergias o restricciones dietéticas (opcional):');
  diet = (diet || '').trim();

  // Generate unique ID
  var slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  var id = 'z_' + slug + '_' + Math.floor(Math.random() * 1000);

  var newGuest = {
    id: id,
    name: name,
    side: side,
    tableId: null
  };
  if (meal) newGuest.meal = meal;
  if (diet) newGuest.diet = diet;

  // Add to guests array and save to Firebase
  var newGuests = guests.slice();
  newGuests.push(newGuest);
  db.ref('seating/guests').set(newGuests.map(function(g) {
    // Strip runtime-only props (gender, norm)
    var clean = { id: g.id, name: g.name };
    if (g.side) clean.side = g.side;
    if (g.tableId) clean.tableId = g.tableId;
    if (g.meal) clean.meal = g.meal;
    if (g.diet) clean.diet = g.diet;
    return clean;
  }));

  alert('✓ Agregado: ' + name + '\n\nAhora aparece en Pendientes. Arrástralo a una mesa o usa el botón "Asignar".');
}

// Listen for table clicks when assigning
world.addEventListener('click', function(e) {
  if (!assigningGuest) return;
  var shape = e.target.closest('.table-shape');
  if (!shape) return;
  var tg = shape.closest('.table-group');
  if (!tg) return;

  var targetId = tg.dataset.tableId;
  var targetTable = tables.find(function(t) { return t.id === targetId; });
  var targetGuests = guests.filter(function(g) { return g.tableId === targetId; });

  if (targetGuests.length >= (targetTable.capacity || 10)) {
    shape.style.outline = '3px solid red';
    setTimeout(function() { shape.style.outline = ''; }, 500);

  assigningGuest.tableId = targetId;
  var gIdx = guests.indexOf(assigningGuest);
  if (gIdx >= 0) {
    dbRef.child('guests/' + gIdx + '/tableId').set(targetId);
  }

  cancelAssign();
  renderAll();
  updateStats();
});

// Remove guest from table (send to pending)
function sendToPending(guest) {
  guest.tableId = null;
  var gIdx = guests.indexOf(guest);
  if (gIdx >= 0) {
    dbRef.child('guests/' + gIdx + '/tableId').set(null);
  }
  renderAll();
  updateStats();
  renderPendingList();
}

function renderPlacedElement(id, data) {

function addPlacedElement(type) {
  var def = ELEMENT_DEFS[type];
  if (!def) return;

  var rect = wrap.getBoundingClientRect();
  var centerScreenX = rect.width / 2;
  var centerScreenY = rect.height / 2;
  var worldX = (centerScreenX - panX) / zoom - def.w / 2;
  var worldY = (centerScreenY - panY) / zoom - def.h / 2;
  worldX = Math.max(20, Math.min(WORLD_W - def.w - 20, worldX));
  worldY = Math.max(20, Math.min(WORLD_H - def.h - 20, worldY));

  var id = genElementId(type);
  var data = { type: type, x: Math.round(worldX), y: Math.round(worldY) };
  placedElements[id] = data;
  db.ref('floorplan/placedElements/' + id).set(data);
  var el = renderPlacedElement(id, data);
  // Add staff for this newly placed element
  if (el) addStaffForElement(el);
}

// Drag + resize logic for placed elements (delegated)
var dragPE = null, peStartX, peStartY, peOrigLeft, peOrigTop;
var resizePE = null, peResizeStartX, peResizeStartY, peOrigW, peOrigH;

document.getElementById('world').addEventListener('pointerdown', function(e) {
  var el = e.target.closest('.placed-element');
  if (!el) return;
  if (e.target.classList.contains('pe-delete')) return;

  // Resize handle → activate resize mode
  if (e.target.classList.contains('pe-resize')) {
    resizePE = el;
    el.classList.add('resizing');
    peResizeStartX = e.clientX;
    peResizeStartY = e.clientY;
    peOrigW = el.offsetWidth;
    peOrigH = el.offsetHeight;
    e.preventDefault(); e.stopPropagation();
    return;
  }

  // Otherwise → drag
  dragPE = el;
  el.classList.add('dragging');
  peStartX = e.clientX; peStartY = e.clientY;
  peOrigLeft = parseInt(el.style.left); peOrigTop = parseInt(el.style.top);
  e.preventDefault(); e.stopPropagation();
});

window.addEventListener('pointermove', function(e) {
  if (resizePE) {
    var dw = (e.clientX - peResizeStartX) / zoom;
    var dh = (e.clientY - peResizeStartY) / zoom;
    var type = resizePE.dataset.peType;
    var newW, newH;
    // Para árbol: aspect ratio fijo 1:1 (usar el delta mayor para ambos)
    if (type === 'arbol') {
      var d = Math.max(dw, dh);
      newW = Math.max(40, peOrigW + d);
      newH = Math.max(40, peOrigH + d);
    } else {
      newW = Math.max(40, peOrigW + dw);
      newH = Math.max(40, peOrigH + dh);
    }
    resizePE.style.width = newW + 'px';
    resizePE.style.height = newH + 'px';
    return;
  }
  if (!dragPE) return;
  var dx = (e.clientX - peStartX) / zoom;
  var dy = (e.clientY - peStartY) / zoom;
  dragPE.style.left = (peOrigLeft + dx) + 'px';
  dragPE.style.top = (peOrigTop + dy) + 'px';
});

window.addEventListener('pointerup', function() {
  if (resizePE) {
    resizePE.classList.remove('resizing');
    var id = resizePE.dataset.peId;
    var w = Math.round(resizePE.offsetWidth);
    var h = Math.round(resizePE.offsetHeight);
    if (placedElements[id]) {
      placedElements[id].w = w;
      placedElements[id].h = h;
      db.ref('floorplan/placedElements/' + id).update({ w: w, h: h });
    }
    resizePE = null;
    return;
  }
  if (!dragPE) return;
  dragPE.classList.remove('dragging');
  var id = dragPE.dataset.peId;
  var x = parseInt(dragPE.style.left);
  var y = parseInt(dragPE.style.top);
  if (placedElements[id]) {
    placedElements[id].x = x;
    placedElements[id].y = y;
    db.ref('floorplan/placedElements/' + id).update({ x: x, y: y });
  }
  dragPE = null;
});

function makeWalker(g) {

function startParty() {
  world.classList.add('party-mode');
  refreshTableZones();

  // Spread guests across the entire venue initially
  var assigned = guests.filter(function(g) { return g.tableId; });
  assigned.forEach(function(g, idx) {
    var w = makeWalker(g);

    // Distribute across venue (inside garden only), avoiding tables
    var startX, startY, tries = 0;
    do {
      startX = GARDEN_X_MIN + Math.random() * (GARDEN_X_MAX - GARDEN_X_MIN);
      startY = GARDEN_Y_MIN + Math.random() * (GARDEN_Y_MAX - GARDEN_Y_MIN);
      tries++;
    } while (isInsideTable(startX, startY) && tries < 20);
    w.style.left = startX + 'px';
    w.style.top = startY + 'px';

    world.appendChild(w);
    walkerElements.push(w);

    var isNovio = g.id === 'novio_carlo' || g.id === 'novia_laura';
    if (isNovio) {
      // Novios share a timer -- set up once below
    } else {
      var delay = 2000 + Math.random() * 6000;
      var timer = setInterval(function() { moveOneWalker(w); }, delay);
      walkerTimers.push(timer);
    }

    // Stagger first move
    setTimeout(function() { moveOneWalker(w); }, 500 + idx * 30);
  });

  // Speech bubbles
  var chatTimer = setInterval(showRandomBubble, 6000);
  walkerTimers.push(chatTimer);
  setTimeout(showRandomBubble, 2000);

  // Novios: alternate between together and apart every ~10s
  var noviosTogether = true;
  var noviosTimer = setInterval(function() {
    noviosTogether = !noviosTogether;
    if (noviosTogether) {
      moveNoviosWalker(); // pick shared target
    }
    walkerElements.forEach(function(w) {
      if (w.guestData && (w.guestData.id === 'novio_carlo' || w.guestData.id === 'novia_laura')) {
        if (noviosTogether) {
          moveOneWalker(w); // uses shared noviosWalkerTarget
        } else {
          // Separate: move independently like everyone else
          var cx = parseInt(w.style.left) || WORLD_W / 2;
          var cy = parseInt(w.style.top) || WORLD_H / 2;
          var step = 80 + Math.random() * 120;
          var ang = Math.random() * Math.PI * 2;
          var tx = Math.max(GARDEN_X_MIN, Math.min(GARDEN_X_MAX, cx + Math.cos(ang) * step));
          var ty = Math.max(GARDEN_Y_MIN, Math.min(GARDEN_Y_MAX, cy + Math.sin(ang) * step));
          var sp = 3 + Math.random() * 3;
          w.style.transition = 'left ' + sp + 's ease-in-out, top ' + sp + 's ease-in-out';
          w.style.left = tx + 'px';
          w.style.top = ty + 'px';
        }
      }
    });
  }, 8000);
  walkerTimers.push(noviosTimer);

  // Show music
  if (!musicShown) musicToggle.click();
}

// Get table obstacle zones (cached, refreshed on render)
var tableZones = [];
function refreshTableZones() {
  tableZones = [];
  world.querySelectorAll('.table-group').forEach(function(tg) {
    var x = parseInt(tg.style.left);
    var y = parseInt(tg.style.top);
    var t = tables.find(function(t) { return t.id === tg.dataset.tableId; });
    var r = (t && t.shape === 'round') ? 70 : 80; // avoidance radius
    tableZones.push({ x: x, y: y, r: r });
  });
  // Also add dance floor
  tableZones.push({ x: WORLD_W/2 + 170, y: WORLD_H/2 + 170, r: 180 });
}

function isInsideTable(px, py) {
  for (var i = 0; i < tableZones.length; i++) {
    var z = tableZones[i];
    var dx = px - z.x, dy = py - z.y;
    if (dx * dx + dy * dy < z.r * z.r) return z;
  }
  return null;
}

function lineIntersectsTable(x1, y1, x2, y2) {
  // Check if straight line from (x1,y1) to (x2,y2) passes through any table
  // Sample points along the line
  var steps = 8;
  for (var s = 1; s < steps; s++) {
    var t = s / steps;
    var px = x1 + (x2 - x1) * t;
    var py = y1 + (y2 - y1) * t;
    var hit = isInsideTable(px, py);
    if (hit) return hit;
  }
  return null;
}

function findDetourPoint(x1, y1, x2, y2, obstacle) {
  // Go around the obstacle: find a point perpendicular to the line, outside the obstacle
  var mx = obstacle.x, my = obstacle.y, r = obstacle.r + 30;
  // Angle from obstacle center to midpoint of path
  var midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;
  var ang = Math.atan2(midY - my, midX - mx);
  // Pick perpendicular direction (left or right of obstacle)
  var side = (Math.random() < 0.5) ? 1 : -1;
  var perpAng = ang + side * Math.PI / 2;
  return {
    x: mx + Math.cos(perpAng) * r,
    y: my + Math.sin(perpAng) * r
  };
}

// Keep Carlo and Laura together
var noviosWalkerTarget = null;

function moveNoviosWalker() {
  if (!partyMode) return;
  var stepSize = 80 + Math.random() * 120;
  var angle = Math.random() * Math.PI * 2;
  var base = noviosWalkerTarget || { x: (GARDEN_X_MIN + GARDEN_X_MAX) / 2, y: (GARDEN_Y_MIN + GARDEN_Y_MAX) / 2 };
  var tx = base.x + Math.cos(angle) * stepSize;
  var ty = base.y + Math.sin(angle) * stepSize;
  tx = Math.max(GARDEN_X_MIN, Math.min(GARDEN_X_MAX, tx));
  ty = Math.max(GARDEN_Y_MIN, Math.min(GARDEN_Y_MAX, ty));
  noviosWalkerTarget = { x: tx, y: ty };
  return noviosWalkerTarget;
}

function moveOneWalker(w) {
  if (!partyMode) return;
  var cx = parseInt(w.style.left) || (GARDEN_X_MIN + GARDEN_X_MAX) / 2;
  var cy = parseInt(w.style.top) || (GARDEN_Y_MIN + GARDEN_Y_MAX) / 2;

  var isNovio = w.guestData && (w.guestData.id === 'novio_carlo' || w.guestData.id === 'novia_laura');
  if (isNovio) {
    // Move together -- same target, slight offset so they're side by side
    if (!noviosWalkerTarget) moveNoviosWalker();
    var offset = w.guestData.id === 'novio_carlo' ? 15 : -15;
    var speed = 4 + Math.random() * 2;
    w.style.transition = 'left ' + speed + 's ease-in-out, top ' + speed + 's ease-in-out';
    w.style.left = (noviosWalkerTarget.x + offset) + 'px';
    w.style.top = noviosWalkerTarget.y + 'px';
    return;
  }

  // Pick target that's NOT inside a table AND dentro del jardín
  var tx, ty, attempts = 0;
  do {
    var stepSize = 80 + Math.random() * 120;
    var angle = Math.random() * Math.PI * 2;
    tx = cx + Math.cos(angle) * stepSize;
    ty = cy + Math.sin(angle) * stepSize;
    tx = Math.max(GARDEN_X_MIN, Math.min(GARDEN_X_MAX, tx));
    ty = Math.max(GARDEN_Y_MIN, Math.min(GARDEN_Y_MAX, ty));
    attempts++;
  } while (isInsideTable(tx, ty) && attempts < 10);

  // Check if path goes through a table
  var obstacle = lineIntersectsTable(cx, cy, tx, ty);

  if (obstacle) {
    // Walk around: go to detour point first, then to target
    var detour = findDetourPoint(cx, cy, tx, ty, obstacle);
    detour.x = Math.max(GARDEN_X_MIN, Math.min(GARDEN_X_MAX, detour.x));
    detour.y = Math.max(GARDEN_Y_MIN, Math.min(GARDEN_Y_MAX, detour.y));

    var speed1 = 1.5 + Math.random() * 1.5;
    var speed2 = 1.5 + Math.random() * 1.5;

    // First leg: to detour point
    w.style.transition = 'left ' + speed1 + 's ease-in-out, top ' + speed1 + 's ease-in-out';
    w.style.left = detour.x + 'px';
    w.style.top = detour.y + 'px';

    // Second leg: to final target (after first leg finishes)
    setTimeout(function() {
      if (!partyMode) return;
      w.style.transition = 'left ' + speed2 + 's ease-in-out, top ' + speed2 + 's ease-in-out';
      w.style.left = tx + 'px';
      w.style.top = ty + 'px';
    }, speed1 * 1000 + 100);
  } else {
    // Clear path - go directly
    var speed = 3 + Math.random() * 3;
    w.style.transition = 'left ' + speed + 's ease-in-out, top ' + speed + 's ease-in-out';
    w.style.left = tx + 'px';
    w.style.top = ty + 'px';
  }
}

function endParty() {
  partyMode = false;
  world.classList.remove('party-mode');

  // Stop all individual timers
  walkerTimers.forEach(function(t) { clearInterval(t); });
  walkerTimers = [];

  // Walk back to seats
  walkerElements.forEach(function(w) {
    w.classList.remove('walking');
    w.style.transition = 'left 2s ease-in-out, top 2s ease-in-out';
    var g = w.guestData;
    var pos = getTablePos(g.tableId);
    var tgEl = world.querySelector('.table-group[data-table-id="' + g.tableId + '"]');
    if (tgEl) {
      var map = seatMap[g.tableId] || {};
      var si = null;
      Object.keys(map).forEach(function(k) { if (map[k] === g.id) si = parseInt(k); });
      if (si !== null) {
        var seatEl = tgEl.querySelector('.seat[data-seat-idx="' + si + '"]');
        if (seatEl) {
          w.style.left = (pos.x + parseInt(seatEl.style.left) + 15) + 'px';
          w.style.top = (pos.y + parseInt(seatEl.style.top) + 15) + 'px';
          return;
        }
      }
    }
    w.style.left = pos.x + 'px'; w.style.top = pos.y + 'px';
  });

  setTimeout(function() {
    walkerElements.forEach(function(w) { if (w.parentNode) w.parentNode.removeChild(w); });
    walkerElements = [];
  }, 2500);
}

function seedDefaultPlacedElements() {
  // Called only when no placedElements and no legacy stationPositions exist.
  // Spawns one of each main type so Carlo can start moving them.
  var seeds = [
    { type: 'pista',      x: 1030, y: 730  },

  ];
  var updates = {};
  seeds.forEach(function(s) {

    placedElements[id] = s;
    updates[id] = s;
    renderPlacedElement(id, s);
  });

}

function migrateLegacyStationPositions() {
  // One-time migration: old stationPositions { bar-station, tacos-station, photobooth-station }
  // becomes new placedElements entries.
  return db.ref('floorplan/stationPositions').once('value').then(function(snap) {
    var sp = snap.val();
    if (!sp) return false;
    var mapping = {
      'bar-station': 'barra',
      'tacos-station': 'tacos',
      'photobooth-station': 'photobooth'
    };
    var updates = {};
    Object.keys(mapping).forEach(function(oldId) {
      if (sp[oldId] && typeof sp[oldId].x === 'number') {
        var type = mapping[oldId];
        var id = genElementId(type);
        var data = { type: type, x: sp[oldId].x, y: sp[oldId].y };
        placedElements[id] = data;
        updates[id] = data;
      }
    });
    // Also seed pista de baile at old fixed position
    var pistaId = genElementId('pista');
    var pistaData = { type: 'pista', x: 1030, y: 730 };
    placedElements[pistaId] = pistaData;
    updates[pistaId] = pistaData;
    // Seed banda near pista
    var bandaId = genElementId('banda');
    var bandaData = { type: 'banda', x: 1500, y: 730 };
    placedElements[bandaId] = bandaData;
    updates[bandaId] = bandaData;

    if (Object.keys(updates).length === 0) return false;
    return db.ref('floorplan/placedElements').set(updates).then(function() {
      db.ref('floorplan/stationPositions').remove();
      renderAllPlacedElements();
      return true;
    });
  });
}

window.addEventListener('load', function() {
  zoomFit();

  // Load placed elements from Firebase (with migration + seeding)
  db.ref('floorplan/placedElements').once('value').then(function(snap) {
    var pe = snap.val();
    if (pe && Object.keys(pe).length > 0) {
      placedElements = pe;
      renderAllPlacedElements();
      createStaff();
    } else {
      migrateLegacyStationPositions().then(function(migrated) {
        if (!migrated) seedDefaultPlacedElements();
        createStaff();
      });
    }
  });

  // Live updates: re-render when another client modifies placed elements
  db.ref('floorplan/placedElements').on('value', function(snap) {
    var pe = snap.val() || {};
    // Only re-render if set of IDs changed (avoid fighting drag in progress)
    if (dragPE) return;
    var newIds = Object.keys(pe).sort().join(',');
    var oldIds = Object.keys(placedElements).sort().join(',');
    if (newIds !== oldIds) {
      placedElements = pe;
      renderAllPlacedElements();
      createStaff();
    } else {
      placedElements = pe;
    }
  });

  // Live updates for captains
  db.ref('floorplan/captainByTable').on('value', function(snap) {
    captainByTable = snap.val() || {};
    if (captainsOpen) renderCaptainsList();
    renderAll();
  });

  // Live updates for seatMap (cross-device seat-position sync)
  db.ref('floorplan/seatMap').on('value', function(snap) {
    var remote = snap.val() || {};
    // Skip if user is mid-drag to avoid fighting their move
    if (movingSeat) return;
    seatMap = remote;
    renderAll();
    if (sidebarCurrentTableId) {
      var t = tables.find(function(x) { return x.id === sidebarCurrentTableId; });
      if (t) openSidebar(t, getTableGuestsOrdered(t.id));
    }
  });

  // Live updates for table name overrides
  db.ref('floorplan/tableNames').on('value', function(snap) {
    tableNameOverrides = snap.val() || {};
    renderAll();
    // If sidebar is open for a table, refresh title
    if (sidebarCurrentTableId) {
      var t = tables.find(function(x) { return x.id === sidebarCurrentTableId; });
      if (t) {
        var titleSpan = document.querySelector('#sidebar-title span');
        if (titleSpan) titleSpan.textContent = getTableDisplayName(t) + (t.kind ? ' (' + t.kind + ')' : '');
      }
    }
  });

  // Live updates for table rotations (rotar mesas rect 90°)
  db.ref('floorplan/tableRotations').on('value', function(snap) {
    tableRotations = snap.val() || {};
    renderAll();
    // If sidebar is open, refresh it so the button label updates
    if (sidebarCurrentTableId) {
      var t = tables.find(function(x) { return x.id === sidebarCurrentTableId; });
      if (t) openSidebar(t, getTableGuestsOrdered(t.id));
    }
  });

  // Live updates for pergola offset
  db.ref('floorplan/pergolaOffset').on('value', function(snap) {
    var po = snap.val();
    if (po && typeof po.dx === 'number' && typeof po.dy === 'number') {
      // Don't override while user is actively dragging
      if (!dragPergola) {
        pergolaOffset = po;
        applyPergolaOffset();
      }
    }
  });
});
window.addEventListener('resize', function() {
  // keep current view
});
</script>
</body>
</html>
